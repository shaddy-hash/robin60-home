<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy 60th, Robin!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0e0b08; overflow: hidden; }

    .grid {
      position: fixed; inset: 0; z-index: 0;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 2px;
    }

    .cell {
      overflow: hidden;
      position: relative;
    }

    /* Each cell has two img layers that crossfade */
    .cell img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: saturate(0.88) brightness(0.65);
      transition: opacity 1.8s ease-in-out;
    }

    .cell img.behind { opacity: 0; }
    .cell img.front  { opacity: 1; }

    .cell:hover img.front {
      filter: saturate(1.05) brightness(0.78);
      transition: filter 0.6s ease;
    }

    /* Slow Ken Burns on each cell - CSS only, staggered */
    .cell { animation: drift 22s ease-in-out infinite alternate; }
    .cell:nth-child(1)  { animation-delay:  0.0s; }
    .cell:nth-child(2)  { animation-delay: -3.1s; }
    .cell:nth-child(3)  { animation-delay: -6.3s; }
    .cell:nth-child(4)  { animation-delay: -9.4s; }
    .cell:nth-child(5)  { animation-delay:-12.5s; }
    .cell:nth-child(6)  { animation-delay:-15.6s; }
    .cell:nth-child(7)  { animation-delay:-18.8s; }
    .cell:nth-child(8)  { animation-delay: -1.5s; }
    .cell:nth-child(9)  { animation-delay: -4.7s; }
    .cell:nth-child(10) { animation-delay: -7.8s; }
    .cell:nth-child(11) { animation-delay:-10.9s; }
    .cell:nth-child(12) { animation-delay:-14.1s; }
    .cell:nth-child(13) { animation-delay:-17.2s; }
    .cell:nth-child(14) { animation-delay:-20.3s; }
    .cell:nth-child(15) { animation-delay: -2.2s; }
    .cell:nth-child(16) { animation-delay: -5.4s; }
    .cell:nth-child(17) { animation-delay: -8.5s; }
    .cell:nth-child(18) { animation-delay:-11.6s; }
    .cell:nth-child(19) { animation-delay:-14.8s; }
    .cell:nth-child(20) { animation-delay:-17.9s; }
    .cell:nth-child(21) { animation-delay:-21.0s; }
    .cell:nth-child(22) { animation-delay: -0.8s; }
    .cell:nth-child(23) { animation-delay: -3.9s; }
    .cell:nth-child(24) { animation-delay: -7.0s; }
    .cell:nth-child(25) { animation-delay:-10.2s; }
    .cell:nth-child(26) { animation-delay:-13.3s; }
    .cell:nth-child(27) { animation-delay:-16.4s; }
    .cell:nth-child(28) { animation-delay:-19.5s; }
    .cell:nth-child(29) { animation-delay: -2.7s; }
    .cell:nth-child(30) { animation-delay: -5.8s; }
    .cell:nth-child(31) { animation-delay: -9.0s; }
    .cell:nth-child(32) { animation-delay:-12.1s; }
    .cell:nth-child(33) { animation-delay:-15.2s; }
    .cell:nth-child(34) { animation-delay:-18.3s; }
    .cell:nth-child(35) { animation-delay:-21.5s; }

    @keyframes drift {
      from { transform: scale(1.0); }
      to   { transform: scale(1.10); }
    }

    /* Veil - dark centre only, edges show photos clearly */
    .veil {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(
        ellipse 55% 48% at 50% 50%,
        rgba(8,6,4,0.82) 0%,
        rgba(8,6,4,0.54) 40%,
        rgba(8,6,4,0.16) 68%,
        rgba(8,6,4,0.03) 100%
      );
    }

    .frame {
      position: fixed; inset: 24px; z-index: 2;
      border: 1px solid rgba(210,175,80,0.22); pointer-events: none;
    }
    .frame::after {
      content: ''; position: absolute; inset: 5px;
      border: 1px solid rgba(210,175,80,0.10);
    }

    .stage {
      position: fixed; inset: 0; z-index: 3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.62rem, 1.5vw, 0.76rem);
      font-weight: 300; letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(210,175,80,0.9);
      opacity: 0; animation: fadeUp 1.2s ease 0.2s forwards;
      margin-bottom: 1.1rem;
    }
    .name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: clamp(5.5rem, 18vw, 13rem);
      line-height: 0.85; letter-spacing: -0.02em; color: #FAF6EE;
      opacity: 0; animation: fadeUp 1.4s ease 0.5s forwards;
    }
    .sixty {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic; font-weight: 400;
      font-size: clamp(3rem, 10vw, 7.5rem);
      color: rgba(210,175,80,0.95); line-height: 1.05; display: block;
      opacity: 0; animation: fadeUp 1.4s ease 0.8s forwards;
      margin-top: 0.12em;
    }
    .rule {
      display: flex; align-items: center; gap: 0.9rem;
      margin: 1.8rem 0 1.6rem; width: min(340px, 78vw);
      opacity: 0; animation: fadeUp 1.2s ease 1.0s forwards;
    }
    .rule-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(210,175,80,0.45), transparent);
    }
    .rule-diamond {
      width: 5px; height: 5px; background: rgba(210,175,80,0.7);
      transform: rotate(45deg); flex-shrink: 0;
    }
    .date-line {
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.72rem, 1.8vw, 0.9rem);
      font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(250,246,238,0.60);
      opacity: 0; animation: fadeUp 1.2s ease 1.2s forwards;
      line-height: 1.9;
    }
    .date-line strong { color: rgba(250,246,238,0.85); font-weight: 400; }

    .footer-text {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 3; opacity: 0; animation: fadeUp 1.2s ease 1.6s forwards;
      white-space: nowrap;
    }
    .footer-text p {
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.6rem, 1.4vw, 0.72rem);
      font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(250,246,238,0.28);
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(7, 1fr); }
      .frame { inset: 12px; }
      .footer-text { bottom: 20px; white-space: normal; text-align: center; width: 88%; }
    }
  </style>
</head>
<body>

  <div class="grid" id="mosaic" aria-hidden="true">
</div>

  <div class="veil" aria-hidden="true"></div>
  <div class="frame" aria-hidden="true"></div>

  <div class="stage">
    <p class="eyebrow">Happy Birthday</p>
    <h1 class="name">Robin</h1>
    <span class="sixty">sixty</span>
    <div class="rule">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line"></div>
    </div>
    <p class="date-line">
      <strong>June 1, 2026</strong><br>
      Here's to the next great chapter
    </p>
  </div>

  <div class="footer-text">
    <p>With love, from everyone who knows how extraordinary you are</p>
  </div>

  <script>
    // 52 photos, 35 cells
    // Two img layers per cell — front fades out, behind fades in, then swap
    // No duplicate shown at the same time — tracked via Set

    const TOTAL  = 52;
    const CELLS  = 35;
    const MIN_MS = 4000;   // fastest a cell can swap
    const MAX_MS = 11000;  // slowest

    // Build photo pool: "images/photo1.jpg" ... "images/photo52.jpg"
    const allPhotos = Array.from({length: TOTAL}, (_, i) => `images/photo${i+1}.jpg`);

    // Shuffle helper
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Track which photos are currently visible (by index 0-51)
    const visible = new Set();

    // Pick a random photo NOT currently visible
    function pickNext() {
      const pool = allPhotos.filter((_, i) => !visible.has(i));
      if (!pool.length) return null; // shouldn't happen with 52 > 35
      const idx = Math.floor(Math.random() * pool.length);
      // Find the actual photo index
      let count = 0;
      for (let i = 0; i < TOTAL; i++) {
        if (!visible.has(i)) {
          if (count === idx) return i;
          count++;
        }
      }
      return null;
    }

    // Build the grid cells
    const mosaic = document.getElementById('mosaic');
    const cells = [];

    // Initial assignment: shuffle all photos, take first 35 for initial display
    const initOrder = shuffle(Array.from({length: TOTAL}, (_, i) => i));
    const initVisible = initOrder.slice(0, CELLS);
    initVisible.forEach(i => visible.add(i));
    const queue = initOrder.slice(CELLS); // remaining 17 waiting

    for (let c = 0; c < CELLS; c++) {
      const div = document.createElement('div');
      div.className = 'cell';

      const front = document.createElement('img');
      front.className = 'front';
      front.src = allPhotos[initVisible[c]];
      front.alt = '';

      const behind = document.createElement('img');
      behind.className = 'behind';
      behind.alt = '';

      div.appendChild(behind);
      div.appendChild(front);
      mosaic.appendChild(div);

      cells.push({
        el: div,
        front,
        behind,
        currentIdx: initVisible[c]  // which photo is currently showing
      });
    }

    // Schedule random swaps
    function scheduleSwap(cell) {
      const delay = MIN_MS + Math.random() * (MAX_MS - MIN_MS);
      setTimeout(() => doSwap(cell), delay);
    }

    function doSwap(cell) {
      const nextIdx = pickNext();
      if (nextIdx === null) {
        scheduleSwap(cell);
        return;
      }

      // Load next photo into behind layer
      cell.behind.src = allPhotos[nextIdx];

      // Wait for image to load before crossfading
      const doFade = () => {
        // Swap opacity
        cell.front.classList.remove('front');
        cell.front.classList.add('behind');
        cell.behind.classList.remove('behind');
        cell.behind.classList.add('front');

        // Update tracking
        visible.delete(cell.currentIdx);
        visible.add(nextIdx);
        cell.currentIdx = nextIdx;

        // Swap references
        const tmp = cell.front;
        cell.front = cell.behind;
        cell.behind = tmp;

        // Schedule next swap for this cell
        scheduleSwap(cell);
      };

      if (cell.behind.complete) {
        doFade();
      } else {
        cell.behind.onload = doFade;
        cell.behind.onerror = () => scheduleSwap(cell); // skip broken image
      }
    }

    // Stagger initial swap schedules randomly across all cells
    cells.forEach(cell => scheduleSwap(cell));
  </script>

</body>
</html>
