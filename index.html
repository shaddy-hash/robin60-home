<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy 60th, Robin!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0e0b08; overflow: hidden; }

    /* 7 cols × 5 rows = 35 cells */
    .grid {
      position: fixed; inset: 0; z-index: 0;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 2px;
    }

    .cell {
      overflow: hidden;
      position: relative;
      animation: drift 22s ease-in-out infinite alternate;
    }
  .cell:nth-child(1) { animation-delay: -0.0s; transform-origin: 35% 45%; }
  .cell:nth-child(2) { animation-delay: -1.7s; transform-origin: 65% 25%; }
  .cell:nth-child(3) { animation-delay: -3.4s; transform-origin: 50% 75%; }
  .cell:nth-child(4) { animation-delay: -5.1s; transform-origin: 25% 55%; }
  .cell:nth-child(5) { animation-delay: -6.8s; transform-origin: 75% 35%; }
  .cell:nth-child(6) { animation-delay: -8.5s; transform-origin: 45% 30%; }
  .cell:nth-child(7) { animation-delay: -10.2s; transform-origin: 60% 65%; }
  .cell:nth-child(8) { animation-delay: -11.9s; transform-origin: 30% 50%; }
  .cell:nth-child(9) { animation-delay: -13.6s; transform-origin: 70% 30%; }
  .cell:nth-child(10) { animation-delay: -15.3s; transform-origin: 55% 60%; }
  .cell:nth-child(11) { animation-delay: -17.0s; transform-origin: 20% 40%; }
  .cell:nth-child(12) { animation-delay: -18.7s; transform-origin: 80% 55%; }
  .cell:nth-child(13) { animation-delay: -20.4s; transform-origin: 40% 70%; }
  .cell:nth-child(14) { animation-delay: -22.1s; transform-origin: 65% 20%; }
  .cell:nth-child(15) { animation-delay: -0.8s; transform-origin: 35% 60%; }
  .cell:nth-child(16) { animation-delay: -2.5s; transform-origin: 50% 40%; }
  .cell:nth-child(17) { animation-delay: -4.2s; transform-origin: 70% 60%; }
  .cell:nth-child(18) { animation-delay: -5.9s; transform-origin: 30% 30%; }
  .cell:nth-child(19) { animation-delay: -7.6s; transform-origin: 60% 50%; }
  .cell:nth-child(20) { animation-delay: -9.3s; transform-origin: 45% 65%; }
  .cell:nth-child(21) { animation-delay: -11.0s; transform-origin: 55% 25%; }
  .cell:nth-child(22) { animation-delay: -12.7s; transform-origin: 25% 70%; }
  .cell:nth-child(23) { animation-delay: -14.4s; transform-origin: 75% 45%; }
  .cell:nth-child(24) { animation-delay: -16.1s; transform-origin: 40% 35%; }
  .cell:nth-child(25) { animation-delay: -17.8s; transform-origin: 65% 55%; }
  .cell:nth-child(26) { animation-delay: -19.5s; transform-origin: 20% 55%; }
  .cell:nth-child(27) { animation-delay: -21.2s; transform-origin: 80% 30%; }
  .cell:nth-child(28) { animation-delay: -22.9s; transform-origin: 50% 60%; }
  .cell:nth-child(29) { animation-delay: -1.6s; transform-origin: 35% 20%; }
  .cell:nth-child(30) { animation-delay: -3.3s; transform-origin: 70% 70%; }
  .cell:nth-child(31) { animation-delay: -5.0s; transform-origin: 45% 50%; }
  .cell:nth-child(32) { animation-delay: -6.7s; transform-origin: 60% 35%; }
  .cell:nth-child(33) { animation-delay: -8.4s; transform-origin: 30% 65%; }
  .cell:nth-child(34) { animation-delay: -10.1s; transform-origin: 75% 55%; }
  .cell:nth-child(35) { animation-delay: -11.8s; transform-origin: 50% 30%; }

    .cell img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: saturate(0.88) brightness(0.65);
    }
    .cell:hover img { filter: saturate(1.0) brightness(0.75); transition: filter 0.8s ease; }

    /* Crossfade for cells with 2 photos */
    .cell-fade .img-a { animation: fadeAB 14s ease-in-out infinite; }
    .cell-fade .img-b { animation: fadeBA 14s ease-in-out infinite; }

    @keyframes fadeAB {
      0%, 40%   { opacity: 1; }
      50%, 90%  { opacity: 0; }
      100%      { opacity: 1; }
    }
    @keyframes fadeBA {
      0%, 40%   { opacity: 0; }
      50%, 90%  { opacity: 1; }
      100%      { opacity: 0; }
    }

    @keyframes drift {
      from { transform: scale(1.0); }
      to   { transform: scale(1.10); }
    }

    /* Dark centre veil, light edges so photos show */
    .veil {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(
        ellipse 55% 48% at 50% 50%,
        rgba(8,6,4,0.82) 0%,
        rgba(8,6,4,0.54) 40%,
        rgba(8,6,4,0.18) 68%,
        rgba(8,6,4,0.04) 100%
      );
    }

    .frame {
      position: fixed; inset: 24px; z-index: 2;
      border: 1px solid rgba(210,175,80,0.22); pointer-events: none;
    }
    .frame::after {
      content: ''; position: absolute; inset: 5px;
      border: 1px solid rgba(210,175,80,0.10);
    }

    .stage {
      position: fixed; inset: 0; z-index: 3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.62rem, 1.5vw, 0.76rem);
      font-weight: 300; letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(210,175,80,0.9);
      opacity: 0; animation: fadeUp 1.2s ease 0.2s forwards;
      margin-bottom: 1.1rem;
    }
    .name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: clamp(5.5rem, 18vw, 13rem);
      line-height: 0.85; letter-spacing: -0.02em; color: #FAF6EE;
      opacity: 0; animation: fadeUp 1.4s ease 0.5s forwards;
    }
    .sixty {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic; font-weight: 400;
      font-size: clamp(3rem, 10vw, 7.5rem);
      color: rgba(210,175,80,0.95); line-height: 1.05; display: block;
      opacity: 0; animation: fadeUp 1.4s ease 0.8s forwards;
      margin-top: 0.12em;
    }
    .rule {
      display: flex; align-items: center; gap: 0.9rem;
      margin: 1.8rem 0 1.6rem; width: min(340px, 78vw);
      opacity: 0; animation: fadeUp 1.2s ease 1.0s forwards;
    }
    .rule-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(210,175,80,0.45), transparent);
    }
    .rule-diamond {
      width: 5px; height: 5px; background: rgba(210,175,80,0.7);
      transform: rotate(45deg); flex-shrink: 0;
    }
    .date-line {
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.72rem, 1.8vw, 0.9rem);
      font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(250,246,238,0.60);
      opacity: 0; animation: fadeUp 1.2s ease 1.2s forwards;
      line-height: 1.9;
    }
    .date-line strong { color: rgba(250,246,238,0.85); font-weight: 400; }

    .footer-text {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 3; opacity: 0; animation: fadeUp 1.2s ease 1.6s forwards;
      white-space: nowrap;
    }
    .footer-text p {
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.6rem, 1.4vw, 0.72rem);
      font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(250,246,238,0.28);
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(7, 1fr); }
      .frame { inset: 12px; }
      .footer-text { bottom: 20px; white-space: normal; text-align: center; width: 88%; }
    }
  </style>
</head>
