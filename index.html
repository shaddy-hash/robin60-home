<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Robin's 60th</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #C9A84C;
      --cream:  #FAF6EE;
      --ink:    #1A1410;
      --warm:   #7A6A58;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      overflow: hidden;
    }

    /* ── PHOTO MOSAIC BACKGROUND ── */
    .mosaic {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 3px;
      z-index: 0;
    }

    .mosaic-cell {
      overflow: hidden;
      position: relative;
    }

    .mosaic-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.7) brightness(0.55);
      transition: filter 4s ease;
      animation: slowzoom 20s ease-in-out infinite alternate;
    }

    /* Each cell gets a different zoom start point and delay */
    .mosaic-cell:nth-child(1)  img { animation-delay: 0s;     transform-origin: 30% 40%; }
    .mosaic-cell:nth-child(2)  img { animation-delay: -3s;    transform-origin: 70% 20%; }
    .mosaic-cell:nth-child(3)  img { animation-delay: -6s;    transform-origin: 50% 80%; }
    .mosaic-cell:nth-child(4)  img { animation-delay: -9s;    transform-origin: 20% 60%; }
    .mosaic-cell:nth-child(5)  img { animation-delay: -12s;   transform-origin: 80% 40%; }
    .mosaic-cell:nth-child(6)  img { animation-delay: -1.5s;  transform-origin: 40% 30%; }
    .mosaic-cell:nth-child(7)  img { animation-delay: -4.5s;  transform-origin: 60% 70%; }
    .mosaic-cell:nth-child(8)  img { animation-delay: -7.5s;  transform-origin: 30% 50%; }
    .mosaic-cell:nth-child(9)  img { animation-delay: -10.5s; transform-origin: 70% 30%; }
    .mosaic-cell:nth-child(10) img { animation-delay: -13.5s; transform-origin: 50% 60%; }
    .mosaic-cell:nth-child(11) img { animation-delay: -2s;    transform-origin: 20% 40%; }
    .mosaic-cell:nth-child(12) img { animation-delay: -5s;    transform-origin: 80% 60%; }
    .mosaic-cell:nth-child(13) img { animation-delay: -8s;    transform-origin: 40% 70%; }
    .mosaic-cell:nth-child(14) img { animation-delay: -11s;   transform-origin: 60% 20%; }
    .mosaic-cell:nth-child(15) img { animation-delay: -14s;   transform-origin: 30% 60%; }

    @keyframes slowzoom {
      from { transform: scale(1.0); }
      to   { transform: scale(1.12); }
    }

    /* ── DARK GRADIENT VEIL ── */
    .veil {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%,
          rgba(10,8,6,0.72) 0%,
          rgba(10,8,6,0.55) 50%,
          rgba(10,8,6,0.25) 100%),
        linear-gradient(to bottom,
          rgba(10,8,6,0.5) 0%,
          rgba(10,8,6,0.0) 30%,
          rgba(10,8,6,0.0) 70%,
          rgba(10,8,6,0.6) 100%);
    }

    /* Thin gold lines — decorative frame */
    .frame {
      position: fixed;
      inset: 28px;
      z-index: 2;
      border: 1px solid rgba(201,168,76,0.25);
      pointer-events: none;
    }
    .frame::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(201,168,76,0.12);
    }

    /* ── CENTRE CONTENT ── */
    .center {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.65rem, 1.5vw, 0.78rem);
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp 1.2s ease 0.3s forwards;
      margin-bottom: 1.2rem;
    }

    .headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: clamp(5rem, 16vw, 12rem);
      line-height: 0.88;
      color: var(--cream);
      letter-spacing: -0.02em;
      opacity: 0;
      animation: fadeUp 1.4s ease 0.6s forwards;
    }

    .headline em {
      font-style: italic;
      font-weight: 400;
      color: var(--gold);
      font-size: 0.75em;
      display: block;
      line-height: 1.1;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.8rem 0 1.6rem;
      opacity: 0;
      animation: fadeUp 1.4s ease 0.9s forwards;
      width: min(380px, 80vw);
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.5), transparent);
    }
    .divider-dot {
      width: 4px; height: 4px;
      background: var(--gold);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .subtitle {
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.78rem, 2vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(250,246,238,0.65);
      opacity: 0;
      animation: fadeUp 1.4s ease 1.1s forwards;
      line-height: 2;
    }

    .subtitle strong {
      color: rgba(250,246,238,0.9);
      font-weight: 400;
    }

    .bottom-text {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      opacity: 0;
      animation: fadeUp 1.4s ease 1.5s forwards;
    }

    .bottom-text p {
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.65rem, 1.5vw, 0.75rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(250,246,238,0.35);
    }

    .bottom-text a {
      display: inline-block;
      margin-top: 0.6rem;
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.65rem, 1.5vw, 0.72rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid rgba(201,168,76,0.3);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .bottom-text a:hover {
      color: var(--cream);
      border-color: rgba(250,246,238,0.4);
    }

    /* Hover brighten on mosaic */
    .mosaic-cell:hover img {
      filter: saturate(0.9) brightness(0.65);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .mosaic {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(5, 1fr);
      }
      .frame { inset: 16px; }
      .frame::before { inset: 4px; }
      .bottom-text { bottom: 28px; }
    }
  </style>
</head>
<body>

  <!-- Photo mosaic background -->
  <div class="mosaic" aria-hidden="true">
    <div class="mosaic-cell"><img src="images/photo4.png"  alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo7.png"  alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo10.png" alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo1.png"  alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo13.png" alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo2.png"  alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo5.png"  alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo8.png"  alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo11.png" alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo14.png" alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo3.png"  alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo6.png"  alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo9.png"  alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo12.png" alt=""/></div>
    <div class="mosaic-cell"><img src="images/photo15.png" alt=""/></div>
  </div>

  <!-- Dark veil overlay -->
  <div class="veil" aria-hidden="true"></div>

  <!-- Decorative frame -->
  <div class="frame" aria-hidden="true"></div>

  <!-- Centre content -->
  <div class="center">
    <p class="eyebrow">Celebrating</p>
    <h1 class="headline">
      Robin
      <em>turns 60</em>
    </h1>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>
    <p class="subtitle">
      <strong>May 31 – June 5, 2026</strong><br>
      Singapore · Bali · Buahan
    </p>
  </div>

  <!-- Bottom -->
  <div class="bottom-text">
    <p>Traveling with the people she loves</p>
    <a href="https://trip.robin60.com">View the trip guide →</a>
  </div>

</body>
</html>
